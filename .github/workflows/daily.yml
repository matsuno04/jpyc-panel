name: Daily JPYC panel update

on:
  schedule:
    - cron: "0 20 * * *"  # 20:00 UTC = 05:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Japanese font (for chart labels)
        run: sudo apt-get update && sudo apt-get install -y fonts-ipafont-gothic

      - name: Collect transfer events (all chains)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python collector.py

      - name: Build daily panel
        run: python panel_builder.py

      - name: Generate charts
        run: |
          for scope in ethereum polygon avalanche kaia combined; do
            python analyze.py "$scope" || true
          done

      - name: Commit and push updated data/output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data output
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
          git push
